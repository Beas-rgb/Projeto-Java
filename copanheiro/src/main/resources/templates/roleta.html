<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Roleta</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .roleta-container {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        padding: 30px;
        margin-top: 30px;
    }
    .numero-sorteado {
        font-size: 8rem;
        font-weight: bold;
        color: #ffd700;
        text-shadow: 0 0 20px rgba(255,215,0,0.5);
        background: rgba(0,0,0,0.3);
        border-radius: 50%;
        width: 200px;
        height: 200px;
        line-height: 200px;
        margin: 20px auto;
        animation: girar 2s ease-out;
    }
    @keyframes girar {
        0% { transform: rotate(0deg); }
        360% { transform: rotate(360deg); }
    }
</style>
</head>

<body class="bg-dark text-light text-center">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div class="roleta-container">
        <h1 class="mb-4">🎯 Roleta Numérica</h1>
        
        <div th:if="${erro}" class="alert alert-danger" role="alert">
            <span th:text="${erro}"></span>
        </div>
        
        <div th:if="${resultado}" class="alert alert-info" role="alert">
            <span th:text="${resultado}"></span>
        </div>
        
        <div class="numero-sorteado" id="numeroSorteado">
            <span th:text="${resultado != null ? resultado.split(': ')[1] : '?'}">?</span>
        </div>
        
        <form th:action="@{/roleta/jogar}" method="post">
            <div class="row justify-content-center">
                <div class="col-md-3">
                    <input type="number" min="0" max="9" step="1" 
                           name="numero" id="numero" 
                           placeholder="Número (0-9)" 
                           class="form-control form-control-lg text-center mb-3" required>
                </div>
                <div class="col-md-3">
                    <input type="number" step="0.01" min="0.01" 
                           name="valor" id="valor" 
                           placeholder="Valor da aposta (R$)" 
                           class="form-control form-control-lg text-center mb-3" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-success btn-lg px-5">
                🎯 Girar Roleta
            </button>
        </form>
        
        <div class="mt-4 text-warning">
            <p>💰 Acertar o número paga 5x o valor apostado!</p>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
