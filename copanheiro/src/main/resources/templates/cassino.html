<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça-Níquel do Tigre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #FF6B35 50%, #000000 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .jogo-container {
            background: #000000;
            border-radius: 40px;
            padding: 25px;
            border: 4px solid #FF8C00;
            box-shadow: 0 0 40px rgba(255,140,0,0.5), 0 10px 30px rgba(0,0,0,0.8);
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .jogo-container::before {
            content: "🎰🐯🎰";
            position: absolute;
            top: -20px;
            left: -20px;
            font-size: 5rem;
            opacity: 0.05;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .titulo-jogo {
            text-align: center;
            color: #FF8C00;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0 white, 4px 4px 0 #000000;
            margin-bottom: 20px;
        }

        .slot-machine {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 25px;
            border: 3px solid #FF8C00;
            margin: 10px 0;
        }

        .slot-numbers {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .slot-number {
            width: 100px;
            height: 100px;
            background: #FF8C00;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 900;
            color: #000000;
            border: 4px solid white;
            box-shadow: 0 5px 0 #000000, 0 0 20px rgba(255,140,0,0.5);
            transition: all 0.3s;
        }

        .slot-number.animar {
            animation: girarSlot 0.2s linear infinite;
        }

        @keyframes girarSlot {
            0% { transform: rotateX(0deg) scale(1); background: #FF8C00; }
            50% { transform: rotateX(180deg) scale(0.9); background: white; color: #FF8C00; }
            100% { transform: rotateX(360deg) scale(1); background: #FF8C00; }
        }

        .slot-number.jackpot {
            animation: jackpotAnim 0.5s infinite;
        }

        @keyframes jackpotAnim {
            0%,100% { transform: scale(1); background: #FF8C00; }
            50% { transform: scale(1.2); background: white; color: #FF8C00; box-shadow: 0 0 50px #FF8C00; }
        }

        .area-aposta {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 20px;
            border: 2px solid #FF8C00;
            margin: 15px 0;
        }

        .input-tigre {
            background: #333;
            border: 3px solid #FF8C00;
            color: white;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            font-size: 1.2rem;
            text-align: center;
            font-weight: bold;
        }

        .btn-tigre {
            background: #FF8C00;
            color: #000000;
            font-weight: 900;
            border: 3px solid white;
            border-radius: 50px;
            padding: 12px 20px;
            width: 100%;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin: 5px 0;
            cursor: pointer;
        }

        .btn-tigre:hover {
            background: white;
            color: #FF8C00;
            transform: scale(1.02);
            box-shadow: 0 0 30px #FF8C00;
        }

        .info-painel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }

        .info-box {
            background: #1a1a1a;
            border: 2px solid #FF8C00;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            color: #FF8C00;
        }

        .info-box div {
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .info-box span {
            display: block;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
        }

        .jackpot-line {
            text-align: center;
            color: #FF8C00;
            font-weight: bold;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .voltar {
            background: transparent;
            color: white;
            border: 2px solid #FF8C00;
            border-radius: 40px;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .voltar:hover {
            background: #FF8C00;
            color: #000000;
        }

        .confete {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #FF8C00;
            border-radius: 50%;
            animation: cair 3s linear forwards;
            z-index: 9999;
        }

        @keyframes cair {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="main-content">
        <div class="jogo-container">
            <div class="titulo-jogo">
                🎰 CAÇA-NÍQUEL DO TIGRE 🎰
            </div>
            
            <div class="slot-machine">
                <div th:if="${erro}" class="alert alert-danger text-center p-2" style="font-size: 0.9rem;">[[${erro}]]</div>
                <div th:if="${mensagem}" class="alert text-center p-2" th:classappend="${#strings.contains(mensagem, 'JACKPOT') ? 'bg-warning' : (#strings.contains(mensagem, 'Parabéns') ? 'alert-success' : 'alert-danger')}" style="font-size: 0.9rem; color: black;">[[${mensagem}]]</div>
                
                <div class="slot-numbers">
                    <span class="slot-number" id="n1" th:text="${resultado != null ? resultado.split(' \\| ')[0] : '?'}">?</span>
                    <span class="slot-number" id="n2" th:text="${resultado != null ? resultado.split(' \\| ')[1] : '?'}">?</span>
                    <span class="slot-number" id="n3" th:text="${resultado != null ? resultado.split(' \\| ')[2] : '?'}">?</span>
                </div>
                
                <div class="jackpot-line">
                    🐯 3 TIGRES = 10X | 2 TIGRES = 3X 🐯
                </div>
            </div>
            
            <form th:action="@{/cassino/jogar}" method="post" onsubmit="return animarSlots()">
                <div class="area-aposta">
                    <input type="number" step="0.01" name="valor" id="valor" class="input-tigre" 
                           placeholder="💰 VALOR DA APOSTA" required>
                    
                    <button type="submit" class="btn btn-tigre mt-3">
                        🎰 GIRAR
                    </button>
                </div>
            </form>
            
            <div class="info-painel">
                <div class="info-box">
                    <div>🏆 JACKPOT</div>
                    <span>10X</span>
                </div>
                <div class="info-box">
                    <div>🎯 DUPLA</div>
                    <span>3X</span>
                </div>
            </div>
            
            <a href="/" class="voltar">🏠 VOLTAR</a>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script>
        function criarConfete() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    let confete = document.createElement('div');
                    confete.className = 'confete';
                    confete.style.left = Math.random() * 100 + '%';
                    confete.style.background = ['#FF8C00', '#FFFFFF', '#000000'][Math.floor(Math.random() * 3)];
                    confete.style.animationDuration = (2 + Math.random() * 2) + 's';
                    document.body.appendChild(confete);
                    
                    setTimeout(() => confete.remove(), 4000);
                }, i * 50);
            }
        }
        
        function animarSlots() {
            let valor = document.getElementById("valor").value;
            if (!valor || valor <= 0) {
                alert("🐯 Digite um valor válido!");
                return false;
            }
            
            let slots = document.querySelectorAll('.slot-number');
            slots.forEach(s => s.classList.add('animar'));
            
            setTimeout(() => {
                slots.forEach(s => s.classList.remove('animar'));
            }, 1000);
            
            return true;
        }
        
        // Se for jackpot, anima
        window.onload = function() {
            let mensagem = document.querySelector('.alert-warning');
            if (mensagem && mensagem.innerText.includes('JACKPOT')) {
                criarConfete();
            }
        }
    </script>
</body>
</html>
