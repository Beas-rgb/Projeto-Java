<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Jogo Tigrinho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #FF6B35 50%, #000000 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
        }

        .form-container {
            background: #000000;
            border-radius: 40px;
            padding: 30px;
            border: 4px solid #FF8C00;
            box-shadow: 0 0 40px rgba(255,140,0,0.5);
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        .titulo-form {
            color: #FF8C00;
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            text-shadow: 2px 2px 0 white, 4px 4px 0 #000000;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            color: #FF8C00;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .form-control, .form-select {
            background: #1a1a1a;
            border: 3px solid #FF8C00;
            color: white;
            padding: 12px;
            border-radius: 30px;
            width: 100%;
            font-size: 1rem;
        }

        .form-control:focus, .form-select:focus {
            background: #333;
            border-color: white;
            outline: none;
            box-shadow: 0 0 20px #FF8C00;
        }

        .form-control-color {
            height: 50px;
            padding: 5px;
        }

        .btn-salvar {
            background: #FF8C00;
            color: #000000;
            font-weight: 900;
            border: 3px solid white;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            width: 100%;
            cursor: pointer;
        }

        .btn-salvar:hover {
            background: white;
            color: #FF8C00;
            transform: scale(1.02);
            box-shadow: 0 0 30px #FF8C00;
        }

        .btn-cancelar {
            background: transparent;
            color: white;
            border: 3px solid #FF8C00;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 1.2rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        .btn-cancelar:hover {
            background: #FF8C00;
            color: #000000;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .icone-preview {
            text-align: center;
            font-size: 3rem;
            margin: 10px 0;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 30px;
            border: 2px solid #FF8C00;
        }

        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="main-content">
        <div class="form-container">
            <h1 class="titulo-form">
                🐯 CRIAR JOGO TIGRINHO 🐯
            </h1>

            <form th:action="@{/jogos-personalizados/salvar}" th:object="${jogo}" method="post">
                <div class="form-group">
                    <label class="form-label">📌 NOME DO JOGO</label>
                    <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: Tigre da Sorte" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">📝 DESCRIÇÃO</label>
                    <textarea th:field="*{descricao}" class="form-control" rows="3" placeholder="Descreva seu jogo..."></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">🎮 TIPO DE DINÂMICA</label>
                    <select th:field="*{tipoDinamica}" class="form-select" required>
                        <option value="">SELECIONE...</option>
                        <option value="aviao">✈️ TIGRE VOADOR</option>
                        <option value="roleta">🎯 ROLETA DO TIGRE</option>
                        <option value="cassino">🎰 CAÇA-NÍQUEL DO TIGRE</option>
                        <option value="caraOuCoroa">🪙 CARA OU COROA TIGRE</option>
                        <option value="dado">🎲 DADO DO TIGRE</option>
                    </select>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label class="form-label">⬇️ MULTIPLICADOR MÍN</label>
                        <input type="number" step="0.1" th:field="*{multiplicadorMin}" class="form-control" placeholder="1.0" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">⬆️ MULTIPLICADOR MÁX</label>
                        <input type="number" step="0.1" th:field="*{multiplicadorMax}" class="form-control" placeholder="10.0" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">💰 APOSTA MÍNIMA (R$)</label>
                    <input type="number" step="0.01" th:field="*{apostaMinima}" class="form-control" placeholder="1.00" required>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label class="form-label">🎨 COR DE FUNDO</label>
                        <input type="color" th:field="*{corFundo}" class="form-control form-control-color">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">😊 ÍCONE</label>
                        <input type="text" th:field="*{icone}" class="form-control" placeholder="🐯, 🎲, 🎰">
                    </div>
                </div>
                
                <div class="icone-preview">
                    <span th:text="${jogo.icone ?: '🐯'}">🐯</span>
                </div>
                
                <button type="submit" class="btn-salvar">💾 SALVAR JOGO</button>
                <a href="/jogos-personalizados" class="btn-cancelar">❌ CANCELAR</a>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
