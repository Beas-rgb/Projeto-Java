<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Jogos Tigrinho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #FF6B35 50%, #000000 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px 15px;
        }

        .container-custom {
            max-width: 1200px;
            width: 100%;
        }

        .header-tigre {
            text-align: center;
            margin-bottom: 25px;
        }

        .titulo-pagina {
            color: #FF8C00;
            font-size: 2.5rem;
            font-weight: 900;
            text-shadow: 2px 2px 0 white, 4px 4px 0 #000000;
            margin-bottom: 10px;
        }

        .btn-criar {
            background: #FF8C00;
            color: #000000;
            font-weight: 900;
            border: 3px solid white;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-criar:hover {
            background: white;
            color: #FF8C00;
            transform: scale(1.05);
            box-shadow: 0 0 30px #FF8C00;
        }

        .grid-jogos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .jogo-card {
            background: #000000;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #FF8C00;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .jogo-card:hover {
            transform: translateY(-8px);
            border-color: white;
            box-shadow: 0 0 40px #FF8C00;
        }

        .jogo-card::before {
            content: "🐯";
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 5rem;
            opacity: 0.1;
            transform: rotate(-15deg);
        }

        .tipo-badge {
            background: #FF8C00;
            color: #000000;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 10px;
            border: 1px solid white;
        }

        .jogo-icone {
            font-size: 3.5rem;
            text-align: center;
            margin: 10px 0;
        }

        .jogo-nome {
            color: #FF8C00;
            font-size: 1.3rem;
            font-weight: 900;
            text-align: center;
            margin: 10px 0;
        }

        .jogo-descricao {
            color: #ccc;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 15px;
        }

        .info-card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #FF8C00;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            color: #FF8C00;
            margin: 5px 0;
        }

        .info-item span {
            color: white;
            font-weight: bold;
        }

        .btn-excluir {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #FF0000;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
            opacity: 0.8;
        }

        .btn-excluir:hover {
            background: #FF4444;
            transform: scale(1.1) rotate(90deg);
            opacity: 1;
        }

        .empty-state {
            background: #000000;
            border: 3px solid #FF8C00;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            color: #FF8C00;
            font-size: 1.2rem;
            margin-top: 30px;
        }

        .empty-state a {
            color: white;
            background: #FF8C00;
            padding: 10px 30px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }

        .empty-state a:hover {
            background: white;
            color: #FF8C00;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="main-content">
        <div class="container-custom">
            <div class="header-tigre">
                <h1 class="titulo-pagina">🐯 MEUS JOGOS TIGRINHO 🐯</h1>
                <a href="/jogos-personalizados/novo" class="btn-criar">
                    ➕ CRIAR NOVO JOGO
                </a>
            </div>

            <div class="grid-jogos">
                <div th:each="jogo : ${jogos}" class="jogo-card">
                    <span class="tipo-badge" th:text="${jogo.tipoDinamica}">aviao</span>
                    
                    <form th:action="@{/jogos-personalizados/excluir/{id}(id=${jogo.id})}" method="post" 
                          onsubmit="return confirm('Tem certeza que deseja excluir este jogo?')">
                        <button type="submit" class="btn-excluir" title="Excluir">×</button>
                    </form>
                    
                    <a th:href="@{/jogos-personalizados/jogar/{id}(id=${jogo.id})}" style="text-decoration: none; color: inherit;">
                        <div class="jogo-icone" th:text="${jogo.icone ?: '🎲'}">🎲</div>
                        <div class="jogo-nome" th:text="${jogo.nome}">Nome do Jogo</div>
                        <div class="jogo-descricao" th:text="${jogo.descricao}">Descrição</div>
                        
                        <div class="info-card">
                            <div class="info-item">
                                <span>📊 Multiplicador:</span>
                                <span th:text="${jogo.multiplicadorMin} + 'x a ' + ${jogo.multiplicadorMax} + 'x'">1x a 10x</span>
                            </div>
                            <div class="info-item">
                                <span>💰 Mínimo:</span>
                                <span>R$ [[${jogo.apostaMinima}]]</span>
                            </div>
                        </div>
                        
                        <div style="text-align: center; margin-top: 10px;">
                            <span style="color: #FF8C00;">🐾 JOGAR AGORA 🐾</span>
                        </div>
                    </a>
                </div>
            </div>

            <div th:if="${jogos.empty}" class="empty-state">
                🐯 NENHUM JOGO CRIADO AINDA 🐯
                <br>
                <a href="/jogos-personalizados/novo">CRIAR PRIMEIRO JOGO</a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
