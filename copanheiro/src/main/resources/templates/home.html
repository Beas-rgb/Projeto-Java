<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Casa de Apostas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .jogo-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        padding: 30px;
        transition: transform 0.3s;
        cursor: pointer;
        text-decoration: none;
        color: white;
        display: block;
    }
    .jogo-card:hover {
        transform: scale(1.05);
        text-decoration: none;
        color: white;
    }
    .jogo-icone {
        font-size: 4rem;
        margin-bottom: 15px;
    }
</style>
</head>

<body class="bg-dark text-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container text-center mt-5">
    <h1 class="text-warning mb-5">Escolha seu jogo</h1>

    <div class="row">
        <div class="col-md-4 mb-4">
            <a href="/aviao" class="jogo-card">
                <div class="jogo-icone">✈</div>
                <h3>Avião</h3>
                <p>Multiplicador crescente! Retire antes de quebrar.</p>
            </a>
        </div>
        <div class="col-md-4 mb-4">
            <a href="/roleta" class="jogo-card">
                <div class="jogo-icone">🎯</div>
                <h3>Roleta</h3>
                <p>Acerte o número de 0 a 9 e ganhe 5x!</p>
            </a>
        </div>
        <div class="col-md-4 mb-4">
            <a href="/cassino" class="jogo-card">
                <div class="jogo-icone">🎰</div>
                <h3>Cassino</h3>
                <p>Caça-níquel com prêmios de 3x e 10x!</p>
            </a>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
